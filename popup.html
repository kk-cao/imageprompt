<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>图片反推提示词</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body class="ript-popup-body">
    <main class="ript-popup">
      <header class="ript-popup__header">
        <div class="ript-popup__title-row">
          <div>
            <h1>图片反推提示词</h1>
            <p>右键网页图片即可反推提示词。</p>
            <span id="extensionVersion" class="ript-popup__version"></span>
          </div>
          <button id="openSettings" class="ript-popup__icon-button" type="button">设置</button>
        </div>
      </header>

      <section class="ript-popup__settings" aria-labelledby="settingsTitle">
        <div class="ript-popup__history-head">
          <h2 id="settingsTitle">API 设置</h2>
          <button id="backToMain" type="button">返回</button>
        </div>

        <label class="ript-popup__field">
          <span>API URL</span>
          <input id="apiUrl" type="url" autocomplete="off" placeholder="OpenAI: /v1/chat/completions；Claude: /v1/messages" />
        </label>

        <label class="ript-popup__field">
          <span>API Key</span>
          <input id="apiKey" type="password" autocomplete="off" placeholder="sk-..." />
        </label>

        <label class="ript-popup__field">
          <span>视觉模型名称</span>
          <input id="modelName" type="text" autocomplete="off" placeholder="例如：gpt-4o / claude-opus-4-7" />
        </label>

        <label class="ript-popup__field">
          <span>最大历史数量</span>
          <input id="historyLimit" type="number" min="0" step="1" autocomplete="off" placeholder="0 表示不主动限制" />
        </label>

        <fieldset class="ript-popup__format-field" aria-describedby="outputFormatsHint">
          <legend>生成格式</legend>
          <div class="ript-popup__format-options">
            <label><input id="outputZh" type="checkbox" value="zh"> 中文</label>
            <label><input id="outputEn" type="checkbox" value="en"> English</label>
            <label><input id="outputJson" type="checkbox" value="json"> JSON</label>
          </div>
          <p id="outputFormatsHint">选择越多，首次生成越慢，也会消耗更多 token。</p>
        </fieldset>

        <div class="ript-popup__actions">
          <button id="saveKey" type="button">检测并绑定</button>
          <button id="clearKey" type="button">清除</button>
        </div>

        <p id="status" class="ript-popup__status" role="status"></p>
      </section>

      <section class="ript-popup__history" aria-labelledby="historyTitle">
        <div class="ript-popup__history-head">
          <h2 id="historyTitle">历史记录</h2>
          <div class="ript-popup__history-actions">
            <button id="importHistory" type="button">导入</button>
            <button id="exportHistory" type="button">导出</button>
            <button id="viewAllHistory" type="button">查看全部</button>
            <button id="clearHistory" type="button">清空</button>
          </div>
        </div>
        <div id="historyList" class="ript-popup__history-list"></div>
        <input id="importHistoryFile" type="file" accept="application/json,.json" hidden>
      </section>
    </main>
    <section id="historyDetail" class="ript-history-detail" aria-labelledby="historyDetailTitle" aria-modal="true" role="dialog" hidden>
      <div class="ript-history-detail__panel">
        <header class="ript-history-detail__header">
          <div>
            <h2 id="historyDetailTitle">历史详情</h2>
            <p id="historyDetailMeta"></p>
          </div>
          <button id="closeHistoryDetail" class="ript-history-detail__close" type="button" aria-label="关闭">×</button>
        </header>

        <div id="historyDetailImage" class="ript-history-detail__image"></div>

        <div class="ript-history-detail__tabs" role="tablist" aria-label="提示词格式">
          <button class="is-active" type="button" data-detail-tab="zh">中文</button>
          <button type="button" data-detail-tab="en">English</button>
          <button type="button" data-detail-tab="json">JSON</button>
        </div>

        <textarea id="historyDetailText" class="ript-history-detail__text" spellcheck="false"></textarea>

        <div class="ript-history-detail__rewrite">
          <input id="historyRewriteInput" type="text" placeholder="输入调整目标，例如：改为男孩、更换背景、修改服装">
          <button id="historyRewriteButton" type="button">同步调整</button>
        </div>
        <p id="historyRewriteStatus" class="ript-history-detail__status" role="status"></p>

        <footer class="ript-history-detail__footer">
          <button id="copyHistoryDetail" type="button">复制当前</button>
        </footer>
      </div>
    </section>
    <script src="history-db.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
