<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">图片反推提示词工作流</title>
  <desc id="desc">展示右键图片、AI 分析、编辑提示词、保存历史和导入导出的流程。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7cff3a"/>
      <stop offset="1" stop-color="#c8ff8a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="960" height="420" rx="30" fill="url(#bg)"/>
  <circle cx="820" cy="62" r="96" fill="#7cff3a" opacity="0.05"/>
  <circle cx="128" cy="365" r="130" fill="#94a3b8" opacity="0.06"/>

  <g transform="translate(54 54)">
    <text x="0" y="0" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="800">图片反推提示词</text>
    <text x="0" y="35" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="15">右键网页图片，生成中文、英文和 JSON 结构化提示词</text>
  </g>

  <g filter="url(#shadow)" font-family="Segoe UI, Arial, sans-serif">
    <g transform="translate(54 126)">
      <rect width="170" height="170" rx="22" fill="#0f172a" stroke="#334155"/>
      <rect x="28" y="34" width="84" height="64" rx="12" fill="none" stroke="#e5ffe0" stroke-width="7"/>
      <path d="M40 82 L58 65 L75 78 L104 50" fill="none" stroke="#7cff3a" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="96" cy="48" r="7" fill="#7cff3a"/>
      <path d="M132 35 V69 M115 52 H149 M121 41 L143 63 M143 41 L121 63" stroke="#7cff3a" stroke-width="5" stroke-linecap="round"/>
      <text x="24" y="132" fill="#f8fafc" font-size="18" font-weight="700">右键图片</text>
    </g>

    <path d="M246 211 H314" stroke="#7cff3a" stroke-width="4" stroke-linecap="round"/>
    <path d="M306 201 L318 211 L306 221" fill="none" stroke="#7cff3a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <g transform="translate(334 126)">
      <rect width="230" height="170" rx="22" fill="#0f172a" stroke="#334155"/>
      <rect x="26" y="28" width="178" height="28" rx="14" fill="#1f2937" stroke="#475569"/>
      <rect x="26" y="70" width="178" height="68" rx="14" fill="#111827" stroke="#334155"/>
      <text x="44" y="48" fill="#7cff3a" font-size="13" font-weight="800">AI 分析中</text>
      <text x="44" y="96" fill="#f8fafc" font-size="16" font-weight="700">中文 / English / JSON</text>
      <text x="44" y="121" fill="#94a3b8" font-size="13">可复制、可同步调整</text>
    </g>

    <path d="M586 211 H654" stroke="#7cff3a" stroke-width="4" stroke-linecap="round"/>
    <path d="M646 201 L658 211 L646 221" fill="none" stroke="#7cff3a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <g transform="translate(674 126)">
      <rect width="230" height="170" rx="22" fill="#0f172a" stroke="#334155"/>
      <rect x="26" y="28" width="60" height="60" rx="14" fill="#111827" stroke="#475569"/>
      <path d="M38 70 L50 58 L63 68 L78 45" fill="none" stroke="#7cff3a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="102" y="30" width="94" height="19" rx="9" fill="#1f2937"/>
      <rect x="102" y="61" width="70" height="19" rx="9" fill="#1f2937"/>
      <rect x="26" y="110" width="178" height="34" rx="17" fill="none" stroke="#7cff3a"/>
      <text x="44" y="132" fill="#7cff3a" font-size="13" font-weight="800">历史库 / 导入导出</text>
    </g>
  </g>
</svg>
